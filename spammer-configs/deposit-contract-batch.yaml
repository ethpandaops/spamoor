# Name: Deposit Contract Batch Spammer
# Description: Spams the beacon-chain deposit contract via a tiny geas batching contract that performs N deposits per tx (1 ETH each). Two flavours are provided - top-ups for an existing genesis validator (no signature needed) and full deposits for a fresh validator (with valid BLS signature). Each tx is sized to use ~10M gas to push as many deposits as possible per block.
# Tags: deposit, beacon, electra, performance, gas-optimization
# Min_Version: v1.1.5
- scenario: geastx
  name: 'Deposit-contract: 410 top-ups per tx (1 ETH each, ~10M gas, 200M total)'
  description: Calls the deposit contract 415 times per tx with a 1 ETH top-up to validator #0. Calldata uses a zero signature (top-ups skip BLS verification on the consensus layer). Sized to consume ~10M gas per tx.
  config:
    # Wallet settings - each tx pays 415 ETH so wallets need a hefty refill.
    # Wei values that overflow uint64 must be quoted so YAML keeps them as strings.
    seed: deposit-batch-topup
    refill_amount: "50000000000000000000000"   # 50000 ETH
    refill_balance: "40000000000000000000000"  # refill when below 40000 ETH
    refill_interval: 600
    max_wallets: 5

    # Scenario throughput
    total_count: 0
    throughput: 30
    max_pending: 20
    rebroadcast: 1

    # Tx fees (gwei)
    base_fee: 20
    tip_fee: 2

    # Gas budget: ~63k for the first (cold) deposit + ~24k each subsequent
    # warm deposit (measured on devnet). 415 deposits ~= 9.92M gas, sized
    # to fit just under the 10M cap with ~80k headroom.
    gas_limit: 10000000
    deploy_gas_limit: 1000000

    # Amount sent into the batch contract (gwei). Batch size = amount / 1 ETH,
    # so 415_000_000_000 gwei = 415 ETH = 415 deposits per tx.
    amount: 410000000000

    log_txs: true
    timeout: ""
    client_group: ""
    deploy_client_group: ""

    geas_file: ""
    geas_code: |
      ;;; Batch beacon-chain deposit contract spammer (top-up flavour).
      ;;;
      ;;; Calls the deposit contract N times with the embedded calldata,
      ;;; sending 1 ETH on each call. N = msg.value / 1 ETH, so the batch
      ;;; size is controlled entirely by the value sent to this contract.
      ;;;
      ;;; The embedded calldata is a 1 ETH top-up to validator #0
      ;;; (pubkey aaf6c1...dff26c, withdrawal_credentials 0048281f...d28d).
      ;;; The signature is all-zero and the deposit_data_root is the
      ;;; SHA-256 hash-tree-root of that DepositData, which is what the
      ;;; deposit contract verifies. The consensus layer skips BLS
      ;;; verification for additional deposits to an existing validator.

      #define DEPOSIT_ADDR  = 0x00000000219ab540356cBB839Cbe05303d7705Fa
      #define ONE_ETH_WEI   = 0xde0b6b3a7640000
      #define DATA_SIZE     = 420

          ;; Copy the embedded deposit calldata into memory[0:DATA_SIZE].
          push DATA_SIZE
          push @deposit_calldata
          push0
          codecopy

          ;; count = msg.value / 1 ETH; bail out if zero.
          callvalue
          push ONE_ETH_WEI
          swap1
          div
          dup1
          iszero
          push @end
          jumpi

      loop:
          ;; CALL(gas, addr, value, argsOff, argsSize, retOff, retSize)
          push0
          push0
          push DATA_SIZE
          push0
          push ONE_ETH_WEI
          push DEPOSIT_ADDR
          gas
          call
          pop

          push 1
          swap1
          sub
          dup1
          push @loop
          jumpi

      end:
          stop

      #bytes deposit_calldata: 

- scenario: geastx
  name: 'Deposit-contract: 410 fresh deposits per tx (1 ETH each, valid BLS sig, ~10M gas, 200M total)'
  description: Calls the deposit contract 410 times per tx with a 1 ETH deposit for a fresh validator. Calldata carries a BLS-signed DepositMessage (privkey 0x111...111, withdrawal_credentials 0x02...) that the consensus layer accepts as a new pending deposit. Sized to consume ~10M gas per tx.
  config:
    seed: deposit-batch-fresh
    refill_amount: "50000000000000000000000"   # 50000 ETH
    refill_balance: "40000000000000000000000"  # refill when below 40000 ETH
    refill_interval: 600
    max_wallets: 5

    total_count: 0
    throughput: 30
    max_pending: 20
    rebroadcast: 1

    base_fee: 20
    tip_fee: 2

    gas_limit: 10000000
    deploy_gas_limit: 1000000

    amount: 410000000000

    log_txs: true
    timeout: ""
    client_group: ""
    deploy_client_group: ""

    geas_file: ""
    geas_code: |
      ;;; Batch beacon-chain deposit contract spammer (fresh deposit flavour).
      ;;;
      ;;; Identical to the top-up flavour but the embedded calldata is a
      ;;; valid 1 ETH deposit for a fresh validator. Pubkey is derived from
      ;;; BLS privkey 0x1111..1111, withdrawal_credentials uses the 0x02
      ;;; (compounding) prefix, signature signs the DepositMessage with the
      ;;; devnet GENESIS_FORK_VERSION 0x10000038 and DOMAIN_DEPOSIT
      ;;; 0x03000000. The consensus layer accepts this as a new pending
      ;;; deposit; once balance reaches the activation threshold the
      ;;; validator activates.

      #define DEPOSIT_ADDR  = 0x00000000219ab540356cBB839Cbe05303d7705Fa
      #define ONE_ETH_WEI   = 0xde0b6b3a7640000
      #define DATA_SIZE     = 420

          push DATA_SIZE
          push @deposit_calldata
          push0
          codecopy

          callvalue
          push ONE_ETH_WEI
          swap1
          div
          dup1
          iszero
          push @end
          jumpi

      loop:
          push0
          push0
          push DATA_SIZE
          push0
          push ONE_ETH_WEI
          push DEPOSIT_ADDR
          gas
          call
          pop

          push 1
          swap1
          sub
          dup1
          push @loop
          jumpi

      end:
          stop

      #bytes deposit_calldata: 
