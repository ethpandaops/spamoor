# Built-in "Regular Chain Load" default spammer group.
#
# A balanced mix of everyday transaction types sharing a global throughput
# budget, created paused on first launch as a template. Inserted via the
# regular spammer import machinery; member configs only pin values that
# differ from the scenario defaults.

- scenario: group
  key: regular-chain-load
  name: Regular Chain Load
  description: A balanced mix of everyday transaction types - EOA transfers, ERC-20/721/1155 tokens, ERC-4337 account abstraction, Safe multisig, Curve / Uniswap V2+V3 swaps and blobs - sharing a global budget of 100 tx/slot to emulate organic chain activity.
  group_config:
    throughput_mode: shared
    total_throughput: 100
    total_count: 0
    total_max_pending: 0

- scenario: eoatx
  key: regular-eoatx
  name: EOA Transfers
  description: Plain ETH value transfers between externally-owned accounts.
  group: Regular Chain Load
  group_config:
    weight: 2
    enabled: true
    sort_order: 0
  config:
    # wallet settings
    seed: eoatx-131922 # seed for the wallet
    refill_amount: 5000000000000000000 # refill 5 ETH when
    refill_balance: 1000000000000000000 # balance drops below 1 ETH
    refill_interval: 600 # check every 10 minutes
    # fee_strategy: adaptive # uncomment for dynamic fee headroom with normal distribution

    # scenario: eoatx
    total_count: 0
    throughput: 10
    max_pending: 20
    max_wallets: 10
    rebroadcast: 1
    base_fee: 20
    tip_fee: 2
    amount: 200
    random_amount: true

