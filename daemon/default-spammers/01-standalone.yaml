- scenario: blob-average
  key: blob-average
  name: Blob Average Spammer
  description: Maintains a steady average of ~3 blobs per block
  config:
    # wallet settings
    seed: blob-average-3 # seed for the wallet
    refill_amount: 2000000000000000000 # refill 2 ETH when
    refill_balance: 1000000000000000000 # balance drops below 1 ETH
    refill_interval: 600 # check every 10 minutes

    # scenario: blob-average
    target_average: 3
    tracking_seconds: 3600
    sidecars: 1
    max_pending: 10
    max_wallets: 10
    rebroadcast: 1
    base_fee: 20
    tip_fee: 2
    blob_fee: 20
    blob_v1_percent: 100
    fulu_activation: 0

