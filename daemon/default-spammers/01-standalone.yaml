# Built-in standalone default spammers.
#
# These are inserted (paused) into the daemon database on first launch.
# The files in this directory use the same format as spammer export files /
# --startup-spammer configs: keys omitted from `config` are filled with the
# scenario's defaults at import time.

- scenario: eoatx
  key: eoatx-heavy
  name: EOA Transaction Spammer
  description: 400 type-2 eoa transactions per slot, gas limit 20 gwei, 8.4M gas usage
  config:
    # wallet settings
    seed: eoatx-1 # seed for the wallet
    refill_amount: 1000000000000000000 # refill 1 ETH when
    refill_balance: 500000000000000000 # balance drops below 0.5 ETH
    refill_interval: 600 # check every 10 minutes

    # scenario: eoatx
    total_count: 0
    throughput: 400
    max_pending: 800
    max_wallets: 400
    rebroadcast: 120
    base_fee: 20
    tip_fee: 2
    gas_limit: 0
    amount: 20
    random_amount: false
    random_target: false

