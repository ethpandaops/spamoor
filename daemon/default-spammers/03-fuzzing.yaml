# Built-in "Fuzzing" default spammer group.
#
# Bundles the EVM execution fuzzer (evm-fuzz), the transaction-layer fuzzer
# (tx-fuzz) and the invalid-transaction fuzzer (tx-fuzz-invalid) under one
# shared throughput budget. Created paused on first launch as a template.

- scenario: group
  key: fuzzing
  name: Fuzzing
  description: A mix of fuzzing scenarios - EVM execution fuzzing (random bytecode deployments) and transaction-layer fuzzing (randomized tx types, calldata, access lists, authorizations and blobs) - sharing a global budget of 10 tx/slot to surface consensus and validation bugs.
  group_config:
    throughput_mode: shared
    total_throughput: 10
    total_count: 0
    total_max_pending: 0

- scenario: evm-fuzz
  key: fuzzing-evm
  name: EVM Execution Fuzzing
  description: Deploys contracts with randomly generated, stack-aware bytecode exercising opcodes and precompiles.
  group: Fuzzing
  group_config:
    weight: 2
    enabled: true
    sort_order: 0
  config:
    # wallet settings
    seed: evmfuzz-700001 # seed for the wallet
    refill_amount: 5000000000000000000 # refill 5 ETH when
    refill_balance: 1000000000000000000 # balance drops below 1 ETH
    refill_interval: 600 # check every 10 minutes

    # scenario: evm-fuzz
    total_count: 0
    throughput: 4
    max_pending: 20
    max_wallets: 4
    rebroadcast: 1
    base_fee: 20
    tip_fee: 2
    gas_limit: 1000000
    max_code_size: 512
    min_code_size: 100
    fuzz_mode: all

- scenario: tx-fuzz
  key: fuzzing-tx
  name: Transaction Layer Fuzzing
  description: Sends well-formed transactions across all types (legacy/2930/1559/4844/7702) with randomized calldata, access lists, authorizations, blobs and targets.
  group: Fuzzing
  group_config:
    weight: 2
    enabled: true
    sort_order: 1
  config:
    # wallet settings
    seed: txfuzz-700002 # seed for the wallet
    refill_amount: 5000000000000000000 # refill 5 ETH when
    refill_balance: 1000000000000000000 # balance drops below 1 ETH
    refill_interval: 600 # check every 10 minutes

    # scenario: tx-fuzz
    total_count: 0
    throughput: 4
    max_pending: 20
    max_wallets: 4
    rebroadcast: 1
    base_fee: 20
    tip_fee: 2
    gas_limit: 500000
    tx_types: all
    max_call_data: 1024
    max_access_list: 5
    max_auth_list: 5
    max_blobs: 3

- scenario: tx-fuzz-invalid
  key: fuzzing-tx-invalid
  name: Invalid Transaction Fuzzing
  description: Fires deliberately-invalid transactions (bad chainid/nonce/gas/fees, malformed RLP, empty 7702 auth, blobless blob tx) from a small reused pool of burner wallets, out-of-pool and fire-and-forget. A node accepting one is a potential validation gap.
  group: Fuzzing
  group_config:
    weight: 1
    enabled: true
    sort_order: 2
  config:
    # wallet settings
    seed: txfuzzinvalid-700003 # seed for the wallet
    refill_amount: 50000000000000000 # refill 0.05 ETH when
    refill_balance: 10000000000000000 # balance drops below 0.01 ETH
    refill_interval: 600 # check every 10 minutes

    # scenario: tx-fuzz-invalid
    total_count: 0
    throughput: 2
    max_pending: 20
    max_wallets: 1
    categories: all
